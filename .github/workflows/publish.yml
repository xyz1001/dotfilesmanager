name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install build tools
        run: python -m pip install build twine
      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          package_version="$(python - <<'PY'
          import ast

          with open('setup.py', encoding='utf-8') as setup_file:
              tree = ast.parse(setup_file.read(), filename='setup.py')

          for node in ast.walk(tree):
              if isinstance(node, ast.Call) and getattr(node.func, 'id', None) == 'setup':
                  for keyword in node.keywords:
                      if keyword.arg == 'version' and isinstance(keyword.value, ast.Constant):
                          print(keyword.value.value)
                          raise SystemExit
          raise SystemExit('Could not extract a literal version from setup.py')
          PY
          )"
          test "${TAG_NAME#v}" = "$package_version"
      - name: Build distribution
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
