name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install package, build tools, and linter
        run: python -m pip install . build twine ruff
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Verify command-line interface
        run: dfm --help
      - name: Build distribution
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
